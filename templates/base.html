<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{% block title %}YouStream{% endblock %}</title>
  <link rel="stylesheet" href="/static/css/style.css" />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r134/three.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/vanta@0.5.24/dist/vanta.fog.min.js"></script>
</head>
<body>
  <div id="vanta-bg">
    <header class="header">
      <div class="logo"><a href="/" style="color: #ff0000; text-decoration: none;">🎬 Video Portal</a></div>
    </header>
    <main class="main-content">
      {% block content %}{% endblock %}
    </main>
  </div>

  <script>
    VANTA.FOG({ el: "#vanta-bg", mouseControls: true, touchControls: true, gyroControls: false, minHeight: 200.00, minWidth: 200.00 });
  </script>
</body>
</html>
