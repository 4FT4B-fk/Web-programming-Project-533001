{% extends 'base.html' %}
{% block title %}Login - Video Portal{% endblock %}

{% block content %}
<div class="welcome-box">
  <h2>Dear User, to continue using this website you must Sign in/Register</h2>

  {% if error %}
    <div style="color: red; font-weight: bold; margin-bottom: 10px;">{{ error }}</div>
  {% endif %}

  <form method="POST" action="/login" class="login-form">
    <input type="text" name="username" placeholder="Username" required><br>
    <input type="password" name="password" placeholder="Password" required><br>
    <input type="submit" value="Login">
  </form>

  <p>Don't have an account? <a href="/register" class="register-link">Register here</a></p>
</div>
{% endblock %}
