<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Register - Video Portal</title>
  <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
  <div id="vanta-bg">
    <header class="header">
      <div class="logo">🎬 Video Portal</div>
    </header>

    <main class="main-content">
      <div class="welcome-box">
        <h2>Create Your Account</h2>

        {% if error %}
          <div style="color: red; font-weight: bold; margin-bottom: 10px;">{{ error }}</div>
        {% endif %}

        <form method="POST" action="/register" class="login-form">
          <input type="text" name="username" placeholder="Username" required><br>
          <input type="email" name="email" placeholder="Email" required><br>
          <input type="password" name="password" placeholder="Password" required><br>
          <input type="password" name="confirm_password" placeholder="Confirm Password" required><br>
          <input type="submit" value="Register">
        </form>
        <p>Already have an account? <a href="/">Login here</a></p>
      </div>
    </main>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r134/three.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/vanta@0.5.24/dist/vanta.fog.min.js"></script>
  <script>
    VANTA.FOG({
      el: "#vanta-bg",
      mouseControls: true,
      touchControls: true,
      gyroControls: false,
      minHeight: 200.00,
      minWidth: 200.00
    });
  </script>
</body>
</html>
